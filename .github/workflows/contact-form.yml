name: Contact Form — Send Email Notification

# ─────────────────────────────────────────────────────────────────────
# Triggered by repository_dispatch fired from the Cloudflare Worker.
# The Worker receives the form POST from the browser, then calls
# the GitHub API dispatches endpoint with the form data as
# client_payload. This workflow picks it up and sends the email.
# ─────────────────────────────────────────────────────────────────────
on:
  repository_dispatch:
    types: [contact_form_submission]

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Send inquiry email to Zack
        uses: dawidd6/action-send-mail@v3
        with:
          # ── Gmail SMTP server ──────────────────────────────────────
          server_address: smtp.gmail.com
          server_port:    587
          secure:         false          # uses STARTTLS on port 587

          # ── Credentials from repo Secrets — never in source code ──
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}

          # ── Addressing ────────────────────────────────────────────
          from: ZBML Contact Form <${{ secrets.GMAIL_USER }}>
          to:   ${{ secrets.GMAIL_USER }}

          # ── Subject line ──────────────────────────────────────────
          subject: >-
            New Lesson Inquiry — ${{ github.event.client_payload.instrument }}
            (${{ github.event.client_payload.name }})

          # ── Email body ────────────────────────────────────────────
          body: |
            A new inquiry was submitted through the ZBML contact form.
            ─────────────────────────────────────────────────────────
            Name:        ${{ github.event.client_payload.name }}
            Email:       ${{ github.event.client_payload.email }}
            Phone:       ${{ github.event.client_payload.phone }}
            Instrument:  ${{ github.event.client_payload.instrument }}
            Format:      ${{ github.event.client_payload.format }}
            Submitted:   ${{ github.event.client_payload.submitted }}
            ─────────────────────────────────────────────────────────
            Message:

            ${{ github.event.client_payload.message }}
            ─────────────────────────────────────────────────────────
            Hit Reply to respond directly to this inquiry.

          # ── Reply-To goes straight to the prospective student ─────
          reply_to: ${{ github.event.client_payload.email }}
